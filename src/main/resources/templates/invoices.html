<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Factures - Finance ERP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #1f2937;
        }

        .conteneur {
            width: 90%;
            max-width: 1300px;
            margin: 30px auto;
        }

        .entete {
            background-color: #1d4ed8;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .entete h1 {
            margin: 0 0 10px 0;
        }

        .retour {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            color: white;
            background-color: #2563eb;
            padding: 10px 14px;
            border-radius: 6px;
        }

        .retour:hover {
            background-color: #1d4ed8;
        }

        .grille {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 20px;
        }

        .bloc {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th,
        table td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
            vertical-align: top;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .erreur {
            color: #dc2626;
            font-size: 14px;
            margin-top: -8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="conteneur">

    <div class="entete">
        <h1>Gestion des factures</h1>
        <p>Consulter les factures et ajouter une nouvelle facture liée à un client.</p>
        <a class="retour" th:href="@{/dashboard}">Retour au dashboard</a>
    </div>

    <div class="grille">

        <div class="bloc">
            <h2>Liste des factures</h2>

            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Numéro</th>
                    <th>Date</th>
                    <th>Montant HT</th>
                    <th>TVA</th>
                    <th>Montant TTC</th>
                    <th>Statut</th>
                    <th>Client</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="invoice : ${invoices}">
                    <td th:text="${invoice.id}">1</td>
                    <td th:text="${invoice.numero}">FAC-2026-001</td>
                    <td th:text="${invoice.dateFacture}">2026-04-27</td>
                    <td th:text="${invoice.montantHt}">1000.00</td>
                    <td th:text="${invoice.tva}">200.00</td>
                    <td th:text="${invoice.montantTtc}">1200.00</td>
                    <td th:text="${invoice.statut}">EMISE</td>
                    <td th:text="${invoice.client.nom}">Client Test</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="bloc">
            <h2>Ajouter une facture</h2>

            <form th:action="@{/invoices}" th:object="${invoiceForm}" method="post">
                <label for="numero">Numéro de facture</label>
                <input id="numero" type="text" th:field="*{numero}">
                <div class="erreur" th:if="${#fields.hasErrors('numero')}" th:errors="*{numero}"></div>

                <label for="dateFacture">Date de facture</label>
                <input id="dateFacture" type="date" th:field="*{dateFacture}">
                <div class="erreur" th:if="${#fields.hasErrors('dateFacture')}" th:errors="*{dateFacture}"></div>

                <label for="montantHt">Montant HT</label>
                <input id="montantHt" type="number" step="0.01" th:field="*{montantHt}">
                <div class="erreur" th:if="${#fields.hasErrors('montantHt')}" th:errors="*{montantHt}"></div>

                <label for="tva">TVA</label>
                <input id="tva" type="number" step="0.01" th:field="*{tva}">
                <div class="erreur" th:if="${#fields.hasErrors('tva')}" th:errors="*{tva}"></div>

                <label for="montantTtc">Montant TTC</label>
                <input id="montantTtc" type="number" step="0.01" th:field="*{montantTtc}">
                <div class="erreur" th:if="${#fields.hasErrors('montantTtc')}" th:errors="*{montantTtc}"></div>

                <label for="statut">Statut</label>
                <select id="statut" th:field="*{statut}">
                    <option value="">-- Choisir un statut --</option>
                    <option value="BROUILLON">BROUILLON</option>
                    <option value="EMISE">EMISE</option>
                    <option value="PAYEE">PAYEE</option>
                </select>
                <div class="erreur" th:if="${#fields.hasErrors('statut')}" th:errors="*{statut}"></div>

                <label for="client">Client</label>
                <select id="client" th:field="*{client.id}">
                    <option value="">-- Choisir un client --</option>
                    <option th:each="client : ${clients}"
                            th:value="${client.id}"
                            th:text="${client.nom}">
                    </option>
                </select>
                <div class="erreur" th:if="${#fields.hasErrors('client.id')}" th:errors="*{client.id}"></div>

                <button type="submit">Enregistrer</button>
            </form>
        </div>

    </div>
</div>
</body>
</html>
