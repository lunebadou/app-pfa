services:
  postgres-finance:
    image: postgres:16
    container_name: postgres-finance
    environment:
      POSTGRES_DB: finance_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: fardoujamiou
    ports:
      - "5432:5432"
    volumes:
      - postgres_finance_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-pfa:
    build: .
    image: app-pfa:1.0
    container_name: app-pfa-container
    depends_on:
      postgres-finance:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-finance:5432/finance_erp
      SPRING_DATASOURCE_USERNAME: postgres
      DB_PASSWORD: fardoujamiou
    ports:
      - "9898:9898"

volumes:
  postgres_finance_data: